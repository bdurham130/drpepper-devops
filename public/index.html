<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIS 486 Emoji Match Game</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body {
  background: #f5f5f5;
  text-align: center;
  font-family: 'Roboto', Arial, sans-serif;
  font-size: 16px;
  margin: 0;
  padding: 0;
}

h1 {
  font-size: 28px;
  margin-top: 20px;
}

p {
  font-size: 14px;
}

#gameBoard {
  display: grid;
  grid-template-columns: repeat(4, 100px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.card {
  width: 100px;
  height: 100px;
  background: #0d6efd;
  color: white;
  font-size: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.3s ease;
}

.card.flipped {
  background: white;
  color: black;
}

#leaderboard {
  margin-top: 20px;
}

button {
  font-size: 14px;
  padding: 6px 12px;
  margin-top: 10px;
}

#playerName {
  max-width: 250px;
  margin: 0 auto 10px auto;
}
</style>
</head>

<body class="container">

<h1>CIS 486 Emoji Matching Game 🎮</h1>
<p>Author: Brandon Durham</p>

<div class="mb-3">
  <input id="playerName" class="form-control" placeholder="Enter your name">
</div>

<div>
  Moves: <span id="moves">0</span>
</div>

<div id="gameBoard"></div>

<button class="btn btn-primary mt-3" onclick="startGame()">Restart Game</button>

<hr>

<h2>Leaderboard (Stored in MongoDB)</h2>
<div id="leaderboard"></div>

<script>
const emojis = ["😀","😀","🚀","🚀","🐶","🐶","🍕","🍕","🔥","🔥","🎮","🎮","🌈","🌈","🍩","🍩"];
let flipped = [], matched = 0, moves = 0;

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function startGame(){
  moves = 0; matched = 0; flipped = [];
  $("#moves").text(moves);
  shuffle(emojis);
  $("#gameBoard").empty();
  emojis.forEach((emoji)=>{
    const card=$("<div>").addClass("card").attr("data-emoji",emoji).click(flipCard);
    $("#gameBoard").append(card);
  });
}

function flipCard(){
  if($(this).hasClass("flipped") || flipped.length===2) return;
  $(this).addClass("flipped").text($(this).data("emoji"));
  flipped.push($(this));
  if(flipped.length===2){
    moves++;
    $("#moves").text(moves);
    setTimeout(checkMatch,700);
  }
}

function checkMatch(){
  let a=flipped[0], b=flipped[1];
  if(a.data("emoji")===b.data("emoji")){
    matched+=2;
    if(matched===emojis.length){
      alert("You won! 🎉");
      saveScore();
    }
  } else {
    a.removeClass("flipped").text("");
    b.removeClass("flipped").text("");
  }
  flipped=[];
}

async function saveScore(){
  const name=$("#playerName").val();
  if(!name){ alert("Please enter your name"); return; }
  await fetch("/api/attendance",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({studentName:name,date:new Date().toLocaleDateString(),keyword:"moves:"+moves})
  });
  loadLeaderboard();
}

async function loadLeaderboard(){
  const res=await fetch("/api/attendance");
  const data=await res.json();
  $("#leaderboard").html(
    data.map(r=>`<div class="card p-2 m-1"><strong>${r.studentName}</strong> - ${r.keyword}<button onclick="deleteScore('${r._id}')" class="btn btn-sm btn-danger mt-1">Delete</button></div>`).join("")
  );
}

async function deleteScore(id){
  await fetch("/api/attendance/"+id,{method:"DELETE"});
  loadLeaderboard();
}

startGame();
loadLeaderboard();
</script>

</body>
</html>
